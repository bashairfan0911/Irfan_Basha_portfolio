apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-deployment
  namespace: portfolio-ns
spec:
  replicas: 3
  selector:
    matchLabels:
      app: portfolio-app
  template:
    metadata:
      labels:
        app: portfolio-app
    spec:
      containers:
      - name: portfolio-container
        image: irfan8194/irfan-portfolio:latest
        ports:
        - containerPort: 80

        env:
        - name: MONGODB_USERNAME
          valueFrom:
            secretKeyRef:
              name: portfolio-secret
              key: MONGODB_USERNAME

        - name: MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: portfolio-secret
              key: MONGODB_PASSWORD

        - name: MONGODB_HOST
          valueFrom:
            configMapKeyRef:
              name: portfolio-config
              key: MONGODB_HOST

        - name: MONGODB_PORT
          valueFrom:
            configMapKeyRef:
              name: portfolio-config
              key: MONGODB_PORT

        - name: MONGODB_DB
          valueFrom:
            configMapKeyRef:
              name: portfolio-config
              key: MONGODB_DB

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "200m"
            memory: "256Mi"